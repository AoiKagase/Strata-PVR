<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン | Strata PVR</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #101724; color: #eef3fb; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at top, #213a63, #101724 55%); }
    main { width: min(100% - 2rem, 25rem); padding: 2rem; border: 1px solid #3a4d6b; border-radius: 1rem; background: #172235; box-shadow: 0 1rem 3rem #0008; }
    h1 { margin: 0 0 .4rem; font-size: 1.55rem; } p { color: #bdc9d9; line-height: 1.55; }
    form { display: grid; gap: 1rem; margin-top: 1.5rem; } label { display: grid; gap: .45rem; font-weight: 600; }
    input, button { font: inherit; border-radius: .5rem; padding: .75rem; } input { border: 1px solid #526786; background: #0f1827; color: inherit; }
    button { border: 0; background: #56a1ff; color: #071321; font-weight: 700; cursor: pointer; } button:disabled { opacity: .65; cursor: wait; }
    #error { min-height: 1.4em; color: #ffb4ab; margin: .8rem 0 0; }
  </style>
</head>
<body>
  <main>
    <h1>Strata PVR</h1>
    <p>続行するにはログインしてください。</p>
    <form id="loginForm">
      <label>ユーザー名<input id="username" name="username" autocomplete="username" required autofocus></label>
      <label>パスワード<input id="password" name="password" type="password" autocomplete="current-password" required></label>
      <button id="submit" type="submit">ログイン</button>
    </form>
    <p id="error" role="alert"></p>
  </main>
  <script>
    (function () {
      var form = document.getElementById("loginForm");
      var button = document.getElementById("submit");
      var error = document.getElementById("error");
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        error.textContent = "";
        button.disabled = true;
        fetch("/api/auth/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: document.getElementById("username").value, password: document.getElementById("password").value })
        }).then(function (response) {
          if (!response.ok) { throw new Error("ユーザー名またはパスワードが正しくありません。"); }
          window.location.assign("/");
        }).catch(function (err) {
          error.textContent = err.message || "ログインに失敗しました。";
          button.disabled = false;
        });
      });
    }());
  </script>
</body>
</html>
