<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>視聴</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111418;
      color: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #111418;
    }

    header {
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      background: #171b21;
    }

    h1 {
      margin: 0;
      overflow: hidden;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    main {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 0;
    }

    video {
      width: 100%;
      height: 100%;
      max-height: calc(100vh - 49px);
      background: #000;
      object-fit: contain;
    }

    .message {
      margin: 24px;
      color: #d6dce7;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">視聴</h1>
  </header>
  <main>
    <video id="externalPlayer" controls autoplay playsinline></video>
    <p class="message" id="message" hidden>再生 URL が指定されていません。</p>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var src = params.get("src");
      var title = params.get("title") || "視聴";
      var titleNode = document.getElementById("title");
      var video = document.getElementById("externalPlayer");
      var message = document.getElementById("message");
      document.title = title;
      titleNode.textContent = title;
      if (!src) {
        video.hidden = true;
        message.hidden = false;
        return;
      }
      video.src = new URL(src, window.location.href).toString();
      video.play().catch(function () {
        // The browser may require a manual click before playback starts.
      });
    }());
  </script>
</body>
</html>
