<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>視聴</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --player-bg: oklch(12% 0.018 210);
      --player-panel: oklch(17% 0.022 210);
      --player-ink: oklch(96% 0.012 190);
      --player-ink-soft: oklch(85% 0.018 190);
      --player-line: oklch(96% 0.012 190 / 0.14);
      --player-video-bg: oklch(0% 0 0);
      --player-hover: oklch(23% 0.025 210);
      --player-focus: oklch(80% 0.08 190);
      background: var(--player-bg);
      color: var(--player-ink);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background: var(--player-bg);
    }

    header {
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 10px 16px;
      min-width: 0;
      border-bottom: 1px solid var(--player-line);
      background: var(--player-panel);
    }

    h1 {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    main {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 0;
    }

    video {
      width: 100%;
      height: 100%;
      max-height: calc(100svh - 49px);
      max-height: calc(100dvh - 49px);
      background: var(--player-video-bg);
      object-fit: contain;
    }

    .message {
      display: grid;
      justify-items: center;
      gap: 12px;
      margin: 24px;
      color: var(--player-ink-soft);
      font-size: 14px;
      text-align: center;
    }

    .message p {
      margin: 0;
    }

    .message button {
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--player-line);
      border-radius: 6px;
      background: var(--player-panel);
      color: var(--player-ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .message button:hover,
    .message button:focus-visible {
      background: var(--player-hover);
    }

    .message button:focus-visible {
      outline: 2px solid var(--player-focus);
      outline-offset: 2px;
    }

    .message button[hidden] {
      display: none;
    }

    @media (max-width: 520px) {
      header {
        padding-inline: 12px;
      }

      .message {
        margin: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">視聴</h1>
  </header>
  <main>
    <video id="externalPlayer" controls autoplay playsinline aria-label="視聴プレイヤー">
      <track id="subtitleTrack" kind="subtitles" srclang="ja" label="日本語" default>
    </video>
    <div class="message" id="message" role="status" aria-live="polite" hidden>
      <p id="messageText">再生 URL が指定されていません。</p>
      <button id="retryButton" type="button" hidden>再試行</button>
    </div>
  </main>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var src = params.get("src");
      var subtitles = params.get("subtitles");
      var title = params.get("title") || "視聴";
      var titleNode = document.getElementById("title");
      var video = document.getElementById("externalPlayer");
      var subtitleTrack = document.getElementById("subtitleTrack");
      var message = document.getElementById("message");
      var messageText = document.getElementById("messageText");
      var retryButton = document.getElementById("retryButton");
      var resolvedSrc = "";
      var recoveryTimer = 0;
      var reconnectAttempts = 0;
      var maxReconnectAttempts = 5;
      document.title = title;
      titleNode.textContent = title;

      function showMessage(text, canRetry) {
        video.hidden = true;
        messageText.textContent = text;
        message.hidden = false;
        retryButton.hidden = !canRetry;
      }

      function removeStaleLiveSubtitleCues() {
        var source = subtitleTrack.getAttribute("src");
        var textTrack = subtitleTrack.track;
        var activeCues = textTrack && textTrack.activeCues;
        if (!source || !/\/api\/channel\/[^/]+\/subtitles\.vtt(?:\?|$)/.test(source) || !activeCues || activeCues.length < 2) {
          return;
        }
        Array.prototype.slice.call(activeCues, 0, -1).forEach(function (cue) {
          try {
            textTrack.removeCue(cue);
          } catch (error) {
            // The cue may already have expired while the active cue list was copied.
          }
        });
      }

      function isLiveStream() {
        return /\/api\/channel\/[^/]+\/hls\/index\.m3u8(?:\?|$)/.test(src || "");
      }

      function clearRecoveryTimer() {
        if (recoveryTimer) {
          window.clearTimeout(recoveryTimer);
          recoveryTimer = 0;
        }
      }

      function recoverLivePlayback(reason) {
        if (!isLiveStream() || recoveryTimer) {
          return;
        }
        if (reconnectAttempts >= maxReconnectAttempts) {
          showMessage("ライブ視聴を復旧できませんでした。チャンネルの状態を確認して再試行してください。", true);
          return;
        }
        reconnectAttempts += 1;
        var delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 8000);
        showMessage(reason + " 自動的に再接続しています（" + reconnectAttempts + "/" + maxReconnectAttempts + "）。", false);
        recoveryTimer = window.setTimeout(function () {
          recoveryTimer = 0;
          loadVideo(true);
        }, delay);
      }

      function loadVideo(isRecovery) {
        clearRecoveryTimer();
        if (!src) {
          showMessage("再生 URL が指定されていません。", false);
          return;
        }
        if (!isRecovery) {
          reconnectAttempts = 0;
        }
        try {
          var mediaURL = new URL(src, window.location.href);
          if (isRecovery) {
            mediaURL.searchParams.set("reconnect", String(Date.now()));
          }
          video.src = mediaURL.toString();
          if (subtitles) {
            try {
              subtitleTrack.src = new URL(subtitles, window.location.href).toString();
            } catch (error) {
              subtitleTrack.removeAttribute("src");
            }
          } else {
            subtitleTrack.removeAttribute("src");
          }
          resolvedSrc = video.src;
          video.hidden = false;
          message.hidden = true;
          retryButton.hidden = true;
          video.load();
          video.play().catch(function () {
            // The browser may require a manual click before playback starts.
          });
        } catch (error) {
          showMessage("再生 URL を読み取れません。リンクを作り直して再試行してください。", true);
        }
      }

      retryButton.addEventListener("click", function () { loadVideo(false); });
      subtitleTrack.track.addEventListener("cuechange", removeStaleLiveSubtitleCues);
      video.addEventListener("error", function () {
        if (isLiveStream()) {
          recoverLivePlayback("ライブ配信が中断されました。");
          return;
        }
        showMessage("再生に失敗しました。録画状態と WUI ログを確認して再試行してください。", true);
      });
      video.addEventListener("waiting", function () {
        if (isLiveStream() && !video.paused && !recoveryTimer) {
          recoveryTimer = window.setTimeout(function () {
            recoveryTimer = 0;
            recoverLivePlayback("ライブ配信の受信が遅れています。");
          }, 12000);
        }
      });
      video.addEventListener("timeupdate", clearRecoveryTimer);
      video.addEventListener("playing", function () {
        clearRecoveryTimer();
        reconnectAttempts = 0;
      });
      window.addEventListener("pagehide", function () {
        clearRecoveryTimer();
        if (/\/api\/recorded\/[^/]+\/hls\/index\.m3u8(?:\?|$)/.test(resolvedSrc || src) || /\/api\/channel\/[^/]+\/hls\/index\.m3u8(?:\?|$)/.test(resolvedSrc || src)) {
          fetch(resolvedSrc || src, { method: "DELETE", keepalive: true }).catch(function () {});
        }
      });
      loadVideo(false);
    }());
  </script>
</body>
</html>
